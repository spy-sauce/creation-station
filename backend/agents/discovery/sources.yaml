#
# Curated company slugs for the CrawlerAgent multi-source job board crawler.
#
# Phase 1A: Not consumed — CrawlerAgent returns fixtures.
# Phase 1B: CrawlerAgent loads this file and fans out to each adapter.
#
# Format:
#   greenhouse: list of Greenhouse board slugs (boards.greenhouse.io/{slug}.json)
#   lever: list of Lever company slugs (api.lever.co/v0/postings/{slug})
#   ashby: list of Ashby board slugs (api.ashbyhq.com/posting-api/job-board/{slug})
#   workday: list of {tenant, board} pairs (tenant.wd*.myworkdayjobs.com/board)
#
# Selection criteria:
#   - Companies known to hire for AI/ML engineering roles
#   - Companies in music/creator economy space
#   - Well-funded startups (Series A+) with active hiring
#   - Enterprise companies with known AI divisions
#   - No companies on the candidate's excluded_companies list (filtered at runtime)

