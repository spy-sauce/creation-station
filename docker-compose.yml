version: '3.9'

services:
  app:
    build: .
    container_name: talent-agent-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    container_name: talent-agent-db
    environment:
      POSTGRES_DB: talent_agent
      POSTGRES_USER: talent_agent
      POSTGRES_PASSWORD: talent_agent_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talent_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: talent-agent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery:
    build: .
    container_name: talent-agent-celery
    env_file:
      - .env
    depends_on:
      - redis
      - db
    command: celery -A backend.celery_app worker --loglevel=info

volumes:
  postgres_data:
