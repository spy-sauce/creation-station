# theme.yaml — Talent Agent Dashboard Theme
# Per legendary-funicular/NUTRIENTS.md#1-theme-schema-per-cultivation-themeyaml
# Paints `mycelium dashboard serve` in Top Shelf editorial (gold-on-black)
# DESIGN-CORE is canon; theme.yaml mirrors. If values drift, design-core wins.

brand:
  name: "Talent Agent"
  seal: "TA"
  tagline: "The Dot Connects."
  logo_char: "◆"

palette:
  # Primary accent (Top Shelf gold)
  ink: "#0A0A0A"
  ink_2: "#141414"
  ice: "#FAFAFA"
  ice_2: "#A3A3A3"
  cryo: "#C9A227"  # gold accent
  rule: "#1A1A1A"

  # Extended palette (mirrors DESIGN-CORE)
  gold: "#C9A227"
  gold_dim: "rgba(201, 162, 39, 0.7)"
  gold_faint: "rgba(201, 162, 39, 0.15)"
  bg_primary: "#0A0A0A"
  bg_secondary: "#141414"
  bg_tertiary: "#1A1A1A"
  bg_elevated: "#1F1F1F"
  text_primary: "#FAFAFA"
  text_secondary: "#A3A3A3"
  text_muted: "#737373"
  border: "rgba(255, 255, 255, 0.08)"
  border_hover: "rgba(255, 255, 255, 0.15)"

lifecycle:
  germ: "#A855F7"   # pending purple
  grow: "#3B82F6"   # info blue
  flow: "#EAB308"   # warning yellow
  fruit: "#C9A227"  # gold (success)
  dorm: "#737373"   # muted

severity:
  warn: "#EAB308"   # warning yellow
  alert: "#F97316"  # hot orange
  crit: "#EF4444"   # error red

# Maps biome IDs to stable hues. Lifecycle state modulates brightness, not hue.
identity:
  "data-agent": "#3B82F6"       # info blue — foundation
  "design-agent": "#C9A227"     # gold — design owns the aesthetic
  "auth-agent": "#22C55E"       # success green — security gate
  "obs-agent": "#A855F7"        # pending purple — observability
  "discover-agent": "#F97316"   # hot orange — discovery finds opportunities
  "apply-agent": "#EAB308"      # warning yellow — application requires care
  "agents-agent": "#3B82F6"     # info blue — orchestration
  "api-agent": "#22C55E"        # success green — API surface
  "frontend-agent": "#C9A227"   # gold — user-facing
  "infra-agent": "#737373"      # muted — infrastructure

modulator:
  pending_brightness: 0.30
  active_brightness: 1.00
  fruit_brightness: 0.90
  failed_brightness: 0.45
  active_pulse_hz: 0.56  # 1800ms = 0.56Hz, ≥1.5s discipline per framework spec
