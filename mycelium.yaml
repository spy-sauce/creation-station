synthetics:
  budget:
    monthlyUsd: 20
    abort_threshold_pct: 150
  cache:
    aggressive: true
    prompt_cache_required: true
  target: local
agents:
  - id: data-agent
    scope: PostgreSQL migrations, SQLAlchemy ORM models, Pydantic schemas, database
      connection
    branch: feat/data-agent
    blocked_by: []
    blocks:
      - api-agent
      - auth-agent
      - obs-agent
      - discover-agent
      - apply-agent
      - scheduler-agent
    capabilities:
      - postgresql
      - sqlalchemy
      - alembic
      - pydantic
    sub_agents:
      - id: data-agent.migrations.init
        scope: backend/migrations/001_init.sql — extensions, candidates table baseline
      - id: data-agent.migrations.discovery
        scope: backend/migrations/002_discovery.sql — discovered_jobs, scored_jobs,
          daily_digests, crawl_runs per HYPHA-SCHEMA-CORE
      - id: data-agent.migrations.application
        scope: backend/migrations/003_application.sql — applications,
          application_events, outreach_messages, contacts
      - id: data-agent.migrations.auth
        scope: backend/migrations/004_auth.sql — magic_link_tokens, sessions
      - id: data-agent.models.base
        scope: backend/models/__init__.py + base Declarative class with UUID PK +
          created_at/updated_at mixins
      - id: data-agent.models.discovery
        scope: backend/models/discovery.py — Candidate, DiscoveredJob, ScoredJob,
          DailyDigest, CrawlRun ORM
      - id: data-agent.models.application
        scope: backend/models/application.py — Application, ApplicationEvent,
          OutreachMessage, Contact ORM
      - id: data-agent.models.auth
        scope: backend/models/auth.py — MagicLinkToken, Session ORM
      - id: data-agent.schemas.discovery
        scope: backend/agents/discovery/schemas.py — Pydantic v2 schemas for all
          discovery contracts
      - id: data-agent.schemas.application
        scope: backend/agents/application/schemas.py — Pydantic v2 schemas for
          application contracts
  - id: design-agent
    scope: Design tokens, Top Shelf editorial, CSS custom properties, typography,
      StatusBadge, StatCard
    branch: feat/design-agent
    blocked_by: []
    blocks:
      - frontend-agent
    capabilities:
      - tailwind
      - css-tokens
      - design-system
    sub_agents:
      - id: design-agent.tokens.palette
        scope: frontend/src/design/tokens.css — Top Shelf palette as CSS custom
          properties (--ink, --paper, --gold, severity colors)
      - id: design-agent.tokens.typography
        scope: frontend/src/design/typography.css — font stacks + scale + line-heights
      - id: design-agent.tokens.spacing
        scope: frontend/src/design/spacing.css — 4px-based spacing scale + radius tokens
      - id: design-agent.primitives.status-badge
        scope: frontend/src/components/StatusBadge.tsx — variant prop per agent
          lifecycle state, identity-color border
      - id: design-agent.primitives.stat-card
        scope: frontend/src/components/StatCard.tsx — title + value + delta + sparkline
          slot
      - id: design-agent.docs.cheatsheet
        scope: frontend/src/design/CHEATSHEET.md — token names, usage rules, do/don't
      - id: design-agent.docs.reference
        scope: frontend/src/design/REFERENCE.md — full token table + component gallery
  - id: auth-agent
    scope: JWT issuance, magic-link flow, Resend integration, get_current_user
      dependency
    branch: feat/auth-agent
    blocked_by:
      - data-agent
    blocks:
      - api-agent
      - frontend-agent
      - api-streaming-agent
    capabilities:
      - jwt
      - resend
      - fastapi-deps
    sub_agents:
      - id: auth-agent.magic-link.request
        scope: backend/api/auth.py POST /auth/magic-link — issue token, send via Resend,
          rate-limit 3/hour/email
      - id: auth-agent.magic-link.verify
        scope: backend/api/auth.py POST /auth/verify — validate token, mint JWT, return
          session cookie
      - id: auth-agent.magic-link.resend
        scope: backend/api/auth.py POST /auth/resend — invalidate prior token, issue new
      - id: auth-agent.jwt.issue
        scope: backend/auth/jwt.py issue_jwt(candidate_id, ttl_hours=24) — HS256, signed
          with settings.jwt_secret
      - id: auth-agent.jwt.validate
        scope: backend/auth/jwt.py validate_jwt(token) — raise on expired/invalid
      - id: auth-agent.jwt.current-user
        scope: backend/auth/deps.py get_current_user FastAPI dependency — reads cookie
          or Authorization header, loads Candidate
  - id: obs-agent
    scope: "Observability: structlog config, PII redaction, Redis pub/sub taxonomy,
      CRM events, health endpoint"
    branch: feat/obs-agent
    blocked_by:
      - data-agent
    blocks:
      - api-agent
      - discover-agent
      - apply-agent
      - api-streaming-agent
    capabilities:
      - structlog
      - redis-pubsub
      - logging
    sub_agents:
      - id: obs-agent.logging.config
        scope: backend/obs/logging.py — structlog config, JSON renderer in prod, console
          in dev, request-id correlation
      - id: obs-agent.logging.pii-redact
        scope: backend/obs/redact.py — processor that scrubs emails, phones, resumes,
          tokens before log emission
      - id: obs-agent.pubsub.taxonomy
        scope: backend/obs/events.py — channel constants + payload schemas
          (agent.status.{name}, digest.ready, application.event)
      - id: obs-agent.pubsub.publisher
        scope: backend/obs/publisher.py — publish_event(channel, payload) async helper
          with retry + dead-letter logging
  - id: apply-agent
    scope: "Application engine: JD parser, resume tailor, company intel, contact
      finder, outreach composer, auto-apply"
    branch: feat/apply-agent
    blocked_by:
      - data-agent
      - obs-agent
      - discover-agent
    blocks:
      - agents-agent
    capabilities:
      - anthropic-sdk
      - playwright
      - pydantic
    sub_agents:
      - id: apply-agent.jd-parser
        scope: backend/agents/application/jd_parser.py — Claude extracts requirements,
          responsibilities, comp signal from raw_description
      - id: apply-agent.resume-tailor
        scope: backend/agents/application/resume_tailor.py — emphasize matching
          experience without fabricating skills
      - id: apply-agent.company-intel
        scope: backend/agents/application/company_intel.py — Claude + web fetch for
          mission, recent news, funding signal
      - id: apply-agent.contact-finder
        scope: backend/agents/application/contact_finder.py — LinkedIn/Hunter pivot to
          recruiter or hiring manager
      - id: apply-agent.outreach.composer
        scope: backend/agents/application/outreach_composer.py — personalized opener +
          value pitch + call to action
      - id: apply-agent.auto-apply.greenhouse
        scope: backend/agents/application/auto_apply.py Greenhouse path — uses
          ats_selectors.yaml for field mapping
      - id: apply-agent.auto-apply.lever
        scope: backend/agents/application/auto_apply.py Lever path — split single 'name'
          into first/last
      - id: apply-agent.auto-apply.ashby
        scope: backend/agents/application/auto_apply.py Ashby path — _systemfield_name
          combined-name handling
      - id: apply-agent.auto-apply.workday
        scope: backend/agents/application/auto_apply.py Workday path — multi-step
          continuation, account creation flow, file upload
      - id: apply-agent.orchestrator
        scope: backend/agents/application/orchestrator.py — ApplicationOrchestrator
          wires all sub-agents + Application state machine +
          agent.status.application pub/sub
  - id: agents-agent
    scope: "AgentManager: Claude tool_use agentic loop, sub-agent registry, pipeline
      dispatcher, execution records"
    branch: feat/agents-agent
    blocked_by:
      - apply-agent
    blocks:
      - api-agent
    capabilities:
      - anthropic-sdk
      - tool-use
      - redis-pubsub
    sub_agents:
      - id: agents-agent.registry.defaults
        scope: backend/agents/manager/registry.py — default sub-agent registry mapping
          {discover, apply, score, compose} → handler
      - id: agents-agent.runner.execute
        scope: backend/agents/manager/runner.py — Claude tool_use agentic loop, max-iter
          guard, structured result envelope
      - id: agents-agent.runner.retry
        scope: backend/agents/manager/retry.py — exponential backoff retry policy with
          dead-letter logging on terminal failure
      - id: agents-agent.dispatcher.pipeline
        scope: backend/agents/manager/dispatcher.py — multi-step pipeline orchestration
          across registered handlers
  - id: api-agent
    scope: FastAPI app, routers, middleware, health endpoint, CORS, database wiring
    branch: feat/api-agent
    blocked_by:
      - data-agent
      - auth-agent
      - obs-agent
      - agents-agent
    blocks:
      - frontend-agent
      - infra-agent
      - api-client-agent
      - api-streaming-agent
    capabilities:
      - fastapi
      - pydantic
      - sqlalchemy
      - uvicorn
    sub_agents:
      - id: api-agent.core.main
        scope: backend/main.py — FastAPI app factory, router registration, lifespan (db
          + redis init)
      - id: api-agent.core.config
        scope: backend/config.py — Pydantic Settings, env loading, secret resolution
      - id: api-agent.core.database
        scope: backend/database.py — async SQLAlchemy engine, session factory, redis
          client factory, get_db dependency
      - id: api-agent.routers.discovery
        scope: backend/api/discovery.py — GET /digest/today, POST /discovery/run, GET
          /jobs/{id}
      - id: api-agent.routers.application
        scope: backend/api/application.py — POST /applications, GET /applications, POST
          /applications/{id}/approve, POST /applications/{id}/reject
      - id: api-agent.routers.review
        scope: backend/api/review.py — GET /review/queue, POST /review/{id}/decision
      - id: api-agent.onboarding.resume-profile
        scope: backend/api/onboarding.py — POST /onboarding/resume upload + profile
          build + initial archetype expansion
      - id: api-agent.health.endpoint
        scope: backend/api/health.py — GET /health, GET /readiness with db + redis
          probes
  - id: frontend-agent
    scope: React 19 + Vite 8 frontend, UI primitives, routing, auth context, pages
    branch: feat/frontend-agent
    blocked_by:
      - design-agent
      - api-agent
    blocks:
      - infra-agent
      - api-client-agent
    capabilities:
      - react
      - vite
      - tailwind
      - lucide-react
      - react-router-dom
    sub_agents:
      - id: frontend-agent.primitives.button
        scope: frontend/src/components/ui/Button.tsx — variant + size + loading state
      - id: frontend-agent.primitives.input
        scope: frontend/src/components/ui/Input.tsx — labeled, error state, helper text
      - id: frontend-agent.primitives.card
        scope: frontend/src/components/ui/Card.tsx — header/body/footer composition
      - id: frontend-agent.primitives.dialog
        scope: frontend/src/components/ui/Dialog.tsx — accessible modal with backdrop +
          Escape close
      - id: frontend-agent.layout.sidebar
        scope: frontend/src/layout/Sidebar.tsx — nav links, active state, brand seal
      - id: frontend-agent.layout.dashboard
        scope: frontend/src/layout/DashboardLayout.tsx — sidebar + topbar + content slot
          + auth guard
      - id: frontend-agent.auth-flow.login
        scope: frontend/src/pages/Login.tsx — magic-link request form
      - id: frontend-agent.auth-flow.verify
        scope: frontend/src/pages/Verify.tsx — token-in-url handler, JWT storage,
          redirect
      - id: frontend-agent.auth-flow.context
        scope: frontend/src/auth/AuthContext.tsx — provider, useAuth hook, refresh logic
      - id: frontend-agent.onboarding.wizard
        scope: frontend/src/pages/Onboarding.tsx — resume upload → profile preview →
          confirmation
      - id: frontend-agent.dashboard.overview
        scope: frontend/src/pages/Overview.tsx — today's digest, hot picks, agent
          activity
      - id: frontend-agent.dashboard.pipeline
        scope: frontend/src/pages/Pipeline.tsx — kanban of applications across stages
      - id: frontend-agent.dashboard.analytics
        scope: frontend/src/pages/Analytics.tsx — funnel, conversion, source breakdown
      - id: frontend-agent.review-queue.list
        scope: frontend/src/pages/ReviewQueue.tsx — list of pending approvals with quick
          actions
      - id: frontend-agent.review-queue.detail
        scope: frontend/src/pages/ReviewDetail.tsx — full artifact panes (JD, tailored
          resume, outreach, contact) + approve/reject
  - id: discover-agent
    scope: "Discovery engine: identity profiler, archetype generator, multi-source
      crawler, relevance scorer, digest builder, pub/sub gap closure"
    branch: feat/discover-agent
    blocked_by:
      - data-agent
      - obs-agent
    blocks:
      - apply-agent
      - scheduler-agent
      - api-streaming-agent
    capabilities:
      - anthropic-sdk
      - httpx
      - playwright
      - redis
      - redis-pubsub
    sub_agents:
      - id: discover-agent.identity.profiler
        scope: backend/agents/discovery/identity_profiler.py — Claude-driven
          IdentityProfile builder + 24h Redis cache
      - id: discover-agent.archetype.generator
        scope: backend/agents/discovery/archetype_generator.py — IdentityProfile →
          SearchManifest expansion with exclusions
      - id: discover-agent.crawler.greenhouse
        scope: backend/agents/discovery/crawler_agent.py GreenhouseAdapter — httpx
          async, boards.greenhouse.io/{slug}.json
      - id: discover-agent.crawler.lever
        scope: backend/agents/discovery/crawler_agent.py LeverAdapter — httpx async,
          api.lever.co/v0/postings/{slug}
      - id: discover-agent.crawler.ashby
        scope: backend/agents/discovery/crawler_agent.py AshbyAdapter — httpx async,
          api.ashbyhq.com/posting-api/job-board/{slug}
      - id: discover-agent.crawler.workday
        scope: backend/agents/discovery/crawler_agent.py WorkdayAdapter — playwright
          async, {tenant}.wd1.myworkdayjobs.com/{board}
      - id: discover-agent.scorer.relevance
        scope: backend/agents/discovery/relevance_scorer.py — 6-dimension weighted
          scoring + is_hot threshold
      - id: discover-agent.digest.builder
        scope: backend/agents/discovery/digest_builder.py — compile DailyDigest from
          scored jobs
      - id: discover-agent.orchestrator
        scope: backend/agents/discovery/orchestrator.py — DiscoveryOrchestrator.run
          wires all 5 sub-agents + CrawlRun state + agent.status.discovery
          pub/sub
      - id: discover-agent.pubsub
        scope: backend/agents/discovery/orchestrator.py _publish_status helper — emit
          events to agent.status.discovery channel per pattern from
          application/orchestrator.py
  - id: infra-agent
    scope: Docker, docker-compose, AWS ECS Fargate, Digital Dash pipeline, deploy
      scripts, Celery containers
    branch: feat/infra-agent
    blocked_by:
      - api-agent
      - frontend-agent
      - scheduler-agent
    blocks: []
    capabilities:
      - docker
      - ecs
      - ecr
      - alb
      - digital-dash
      - celery
    sub_agents:
      - id: infra-agent.docker.backend
        scope: backend/Dockerfile — python:3.12-slim, requirements caching, non-root
          user
        artifact: deploy/Dockerfile.backend
      - id: infra-agent.docker.frontend
        scope: frontend/Dockerfile — node build stage + nginx serve stage
        artifact: deploy/Dockerfile.frontend
      - id: infra-agent.docker.compose
        scope: docker-compose.yml — postgres + redis + backend + frontend +
          celery-worker + celery-beat with healthchecks
        artifact: docker-compose.yml
      - id: infra-agent.ecs.task-defs
        scope: deploy/ecs-task-def-backend.json + ecs-task-def-frontend.json +
          ecs-task-def-celery-worker.json + ecs-task-def-celery-beat.json
        artifact: deploy/ecs-task-def-*.json
      - id: infra-agent.ecs.bootstrap
        scope: deploy/setup-aws.sh — one-time VPC, ALB, ECR, ECS cluster, RDS,
          ElastiCache + Celery IAM role
        artifact: deploy/setup-aws.sh
      - id: infra-agent.pipeline.digital-dash
        scope: digital-dash-pipeline.yml — build, test, push, deploy stages with
          approval gate + deploy-celery stage
        artifact: .github/workflows/digital-dash-pipeline.yml
  - id: scheduler-agent
    scope: "Celery beat wiring: app factory, daily discovery task, beat schedule,
      retry policy"
    branch: feat/scheduler-agent
    blocked_by:
      - data-agent
      - discover-agent
    blocks:
      - infra-agent
    capabilities:
      - celery
      - redis
      - asyncio
    sub_agents:
      - id: scheduler-agent.app
        scope: backend/scheduler/celery_app.py — Celery app factory reading broker URL
          from settings.redis_url
      - id: scheduler-agent.tasks
        scope: backend/scheduler/tasks.py — daily_discovery_task(candidate_id) wrapping
          async orchestrator.run
      - id: scheduler-agent.beat
        scope: backend/scheduler/beat.py — Beat schedule 07:00 America/New_York,
          iterates active candidates
      - id: scheduler-agent.retry
        scope: backend/scheduler/tasks.py — exponential backoff 60s/300s/900s,
          dead-letter to crawl_runs.error_log
  - id: api-streaming-agent
    scope: SSE event stream endpoint for real-time agent status streaming
    branch: feat/api-streaming-agent
    blocked_by:
      - api-agent
      - auth-agent
      - obs-agent
      - discover-agent
    blocks:
      - api-client-agent
    capabilities:
      - fastapi
      - sse
      - redis-pubsub
    sub_agents:
      - id: api-streaming-agent.events
        scope: backend/api/events.py — GET /events/stream?channel=... SSE endpoint
      - id: api-streaming-agent.subscriber
        scope: backend/api/events.py — Redis pub/sub subscriber with channel allowlist
      - id: api-streaming-agent.heartbeat
        scope: backend/api/events.py — :ping every 15s for connection loss detection
      - id: api-streaming-agent.backpressure
        scope: backend/api/events.py — drop >100 messages behind, emit slow_client event
  - id: api-client-agent
    scope: "Frontend API client wiring: fetch wrapper, auth token injection, page
      data integration"
    branch: feat/api-client-agent
    blocked_by:
      - api-agent
      - frontend-agent
      - api-streaming-agent
    blocks:
      - tests-agent
    capabilities:
      - typescript
      - fetch
      - eventsource
    sub_agents:
      - id: api-client-agent.client
        scope: frontend/src/api/client.ts — single apiClient instance, base URL from
          VITE_API_BASE_URL
      - id: api-client-agent.auth
        scope: frontend/src/api/auth.ts — requestMagicLink, verifyToken, refreshSession,
          JWT in localStorage
      - id: api-client-agent.discovery
        scope: frontend/src/api/discovery.ts — getTodayDigest, triggerDiscoveryRun,
          getJob
      - id: api-client-agent.applications
        scope: frontend/src/api/applications.ts — listApplications, approveApplication,
          rejectApplication
      - id: api-client-agent.events
        scope: frontend/src/api/events.ts — subscribeAgentStatus(channel, onMessage) via
          EventSource
      - id: api-client-agent.error-handling
        scope: frontend/src/api/client.ts — 401 → invalidate JWT, redirect to /login,
          toast
      - id: api-client-agent.page-wiring
        scope: Re-wire Overview.tsx, Pipeline.tsx, Analytics.tsx, ReviewQueue.tsx,
          ReviewDetail.tsx to use apiClient
  - id: tests-agent
    scope: pytest and vitest test suites for all iter-4 biomes
    branch: feat/tests-agent
    blocked_by:
      - discover-agent
      - scheduler-agent
      - api-streaming-agent
      - api-client-agent
    blocks: []
    capabilities:
      - pytest
      - vitest
      - fakeredis
    sub_agents:
      - id: tests-agent.discovery.pubsub
        scope: tests/discovery/test_orchestrator_pubsub.py — fake Redis, verify 8+ event
          sequence
      - id: tests-agent.scheduler.daily
        scope: tests/scheduler/test_daily_task.py — mock orchestrator, verify crawl_runs
          creation
      - id: tests-agent.api.events
        scope: tests/api/test_events_stream.py — TestClient streaming, verify SSE frames
          + heartbeat
      - id: tests-agent.api.review
        scope: tests/api/test_review_approve.py — full integration approve flow
      - id: tests-agent.frontend.client
        scope: frontend/src/api/__tests__/client.test.ts — vitest, mock fetch, 401
          handling
  - id: synthetics-fixtures-agent
    scope: Synthetic candidate fixtures, JD fixtures, baseline scaffolding, seeder
      for deterministic test data
    branch: feat/synthetics-fixtures-agent
    blocked_by: []
    blocks:
      - synthetics-scoring-agent
      - synthetics-crawler-agent
    capabilities:
      - pydantic
      - pyyaml
      - uuid5
    sub_agents:
      - id: synthetics-fixtures-agent.candidates
        scope: synthetics/fixtures/candidates.yaml — 3 synthetic candidates with full
          resume text + identity context
      - id: synthetics-fixtures-agent.jobs
        scope: synthetics/fixtures/jobs/ — 12 JD markdown files with expected_hot +
          expected_score_band frontmatter
      - id: synthetics-fixtures-agent.baselines
        scope: synthetics/fixtures/baselines/ — gitignored scaffold for baseline
          fingerprints
      - id: synthetics-fixtures-agent.seeder
        scope: synthetics/fixtures/seeder.py — idempotent loader that upserts synthetic
          candidates into Postgres on backend boot
  - id: synthetics-scoring-agent
    scope: Deterministic scoring drift detection via fingerprinting and diffing
      against accepted baselines
    branch: feat/synthetics-scoring-agent
    blocked_by:
      - synthetics-fixtures-agent
    blocks: []
    capabilities:
      - anthropic-sdk
      - pydantic
      - structlog
    sub_agents:
      - id: synthetics-scoring-agent.runner
        scope: backend/synthetics/scoring_runner.py — ScoringSyntheticRunner.run_suite()
          iterates synthetic candidates × JDs
      - id: synthetics-scoring-agent.fingerprint
        scope: backend/synthetics/fingerprint.py — compute_fingerprint(digest, contract)
          produces stable JSON per candidate
      - id: synthetics-scoring-agent.diff
        scope: backend/synthetics/diff.py — diff_against_baseline(fingerprint, baseline,
          contract) returns DriftReport
      - id: synthetics-scoring-agent.cli
        scope: backend/synthetics/cli.py — python -m backend.synthetics run
          --suite=scoring
      - id: synthetics-scoring-agent.cache-verification
        scope: backend/synthetics/scoring_runner.py — verify cache_creation_input_tokens
          == 0 on subsequent runs
  - id: synthetics-crawler-agent
    scope: Upstream health monitoring with state machine alerts for consecutive
      failures
    branch: feat/synthetics-crawler-agent
    blocked_by:
      - synthetics-fixtures-agent
    blocks: []
    capabilities:
      - httpx
      - redis-pubsub
      - structlog
    sub_agents:
      - id: synthetics-crawler-agent.runner
        scope: backend/synthetics/crawler_health.py — CrawlerHealthRunner.run_suite()
          hits known-good slugs per source
      - id: synthetics-crawler-agent.schemas
        scope: backend/synthetics/expected_schema_v1.json — expected top-level shape for
          Greenhouse/Lever/Ashby
      - id: synthetics-crawler-agent.state-machine
        scope: synthetics/state.json — consecutive_failures tracking with 3-strike alert
          threshold
      - id: synthetics-crawler-agent.beat-extension
        scope: backend/synthetics/beat_schedule.py — hourly Celery beat entry for
          crawler health, registered additively
merge_order:
  - data-agent
  - design-agent
  - auth-agent
  - obs-agent
  - discover-agent
  - apply-agent
  - agents-agent
  - api-agent
  - scheduler-agent
  - api-streaming-agent
  - frontend-agent
  - api-client-agent
  - infra-agent
  - tests-agent
  - synthetics-fixtures-agent
  - synthetics-scoring-agent
  - synthetics-crawler-agent
timeline:
  parallel_phases:
    - hours: 0-1
      active:
        - data-agent
        - design-agent
      description: Wave 1 — foundations with zero cross-biome deps. Schemas + models +
        design tokens land first so every downstream biome consumes frozen
        contracts.
    - hours: 1-3
      active:
        - auth-agent
        - obs-agent
      description: Wave 2 — core services depending only on data. Auth + observability
        wire on top of the schema, both consumed by every engine below.
    - hours: 3-5
      active:
        - discover-agent
      description: Wave 3a — Discovery engine with pub/sub gap closure. Must publish
        events on agent.status.discovery channel.
    - hours: 5-7
      active:
        - scheduler-agent
        - api-streaming-agent
      description: Wave 3b — Scheduler and streaming in parallel. Scheduler consumes
        discover-agent, streaming consumes obs-agent.
    - hours: 7-8
      active:
        - apply-agent
      description: Wave 4 — Application engine, blocked by discover-agent.
    - hours: 8-9
      active:
        - agents-agent
      description: Wave 5 — AgentManager wrapper over the engines.
    - hours: 9-11
      active:
        - api-agent
        - frontend-agent
      description: Wave 6 — Surfaces. API + frontend land in parallel.
    - hours: 11-12
      active:
        - api-client-agent
      description: Wave 7 — Frontend API wiring, blocked by api-agent + api-streaming-agent.
    - hours: 12-13
      active:
        - infra-agent
      description: Wave 8 — Deploy. Docker + ECS + Digital Dash pipeline with Celery
        containers.
    - hours: 13-14
      active:
        - tests-agent
      description: Wave 9 — Test sweep across all iter-4 biomes.
    - hours: 14-15
      active:
        - synthetics-fixtures-agent
      description: Wave 10 — Fixtures land first. Synthetic candidates + JDs + seeder.
    - hours: 15-17
      active:
        - synthetics-scoring-agent
        - synthetics-crawler-agent
      description: Wave 11 — Scoring + crawler health run in parallel, both consume
        fixtures.
budget:
  maxUsd: 100
