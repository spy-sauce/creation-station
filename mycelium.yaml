# Mycelium Framework — VibeSpace LLC — The network provides.

organism:
  name: talent-agent
  stack: nextjs-fastapi-supabase
  security_tier: startup
  ship_target: 2026-06-01
  health_pulse_interval: 30
  harvest_threshold: 0.8
  cellular: true
  gating: contract-freeze
  max_depth: 3
  upgrades:
    - hypha-validator
    - depth-3-enforcement
    - routing-map
    - crash-recovery
  routing:
    data-agent:
      - auth-agent
      - obs-agent
      - discover-agent
      - apply-agent
      - api-agent
      - scheduler-agent
    design-agent:
      - frontend-agent
    auth-agent:
      - api-agent
      - frontend-agent
      - api-streaming-agent
    obs-agent:
      - api-agent
      - discover-agent
      - apply-agent
      - api-streaming-agent
    discover-agent:
      - apply-agent
      - scheduler-agent
      - api-streaming-agent
    apply-agent:
      - agents-agent
    agents-agent:
      - api-agent
    api-agent:
      - frontend-agent
      - infra-agent
      - api-client-agent
      - api-streaming-agent
    api-streaming-agent:
      - api-client-agent
    frontend-agent:
      - infra-agent
      - api-client-agent
    api-client-agent:
      - tests-agent
    scheduler-agent:
      - infra-agent
    infra-agent: []
    tests-agent: []
    synthetics-fixtures-agent:
      - synthetics-scoring-agent
      - synthetics-crawler-agent
    synthetics-scoring-agent: []
    synthetics-crawler-agent: []
    "*":
      - data-agent
      - design-agent
